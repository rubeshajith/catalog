<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CATALOG — DYNAMIC MULTI-CATEGORY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

    <script src="data.js"></script>
    <script type="text/babel">
      const { useState, useEffect, useCallback } = React;
      const ITEMS = window.ITEMS;
      const CATEGORIES = [
        "All",
        ...Array.from(new Set(ITEMS.map((i) => i.category))).sort(),
      ];

      // ─── ITEM CARD ────
      function ItemCard({ item, onSelect }) {
        return (
          <div className="item-card" onClick={() => onSelect(item)}>
            <div className="card-img-wrapper">
              <img
                className="card-img"
                src={item.image}
                alt={item.itemname}
                onError={(e) => {
                  e.target.style.opacity = "0";
                }}
              />
              <div className="card-img-overlay" />
              <div className="card-category-badge">{item.category}</div>
            </div>
            <div className="card-body">
              <div className="card-name">{item.itemname}</div>
              <div className="card-props">
                {item.itemprops.slice(0, 3).map((p, i) => (
                  <div key={i} className="card-prop">
                    {p.label}
                    <span>{p.value}</span>
                  </div>
                ))}
              </div>
              <div className="card-footer">
                <span className="card-cta">View Details</span>
                <span className="card-arrow">→</span>
              </div>
            </div>
          </div>
        );
      }

      // ─── HOME PAGE ───
      function HomePage({ onSelect, scrollToCategory }) {
        const [activeFilter, setActiveFilter] = useState("All");
        const [menuOpen, setMenuOpen] = useState(false);
        const [search, setSearch] = useState("");
        const [showSearch, setShowSearch] = useState(false);
        const categories = ["Bikes", "Cars", "Computers", "Phones"];

        const visibleCategories =
          activeFilter === "All"
            ? CATEGORIES.filter((c) => c !== "All")
            : [activeFilter];

        const searchFilteredItems = ITEMS.filter((item) => {
          return (
            item.itemname.toLowerCase().includes(search.toLowerCase()) ||
            item.category.toLowerCase().includes(search.toLowerCase())
          );
        });

        const filteredItems = searchFilteredItems.filter((item) => {
          return activeFilter === "All" || item.category === activeFilter;
        });

        const countForCat = (cat) =>
          searchFilteredItems.filter((i) => i.category === cat).length;

        const collageImages = categories.flatMap((cat) => {
          const items = ITEMS.filter((i) => i.category === cat);
          return items.slice(0, 2).map((item) => item.image);
        });

        useEffect(() => {
          if (scrollToCategory) {
            const el = document.getElementById(`category-${scrollToCategory}`);
            if (el) {
              el.scrollIntoView({ behavior: "smooth", block: "start" });
            }
          }
        }, [scrollToCategory]);
        useEffect(() => {
          if (search.trim()) {
            const el = document.querySelector(".catalog-body");
            if (el) {
              el.scrollIntoView({ behavior: "smooth" });
            }
          }
        }, [search]);
        return (
          <>
            <nav className="nav">
              <div className="nav-logo">
                CAT<span>⬡</span>LOG
              </div>
              <div className="nav-right">
                {!showSearch && (
                  <button
                    className="search-icon-btn"
                    onClick={() => setShowSearch(true)}
                  >
                    <svg
                      className="search-icon"
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="black"
                      stroke="white"
                      strokeWidth="2"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                    >
                      <circle cx="11" cy="11" r="7" />
                      <line x1="16.5" y1="16.5" x2="21" y2="21" />
                    </svg>
                  </button>
                )}
                {showSearch && (
                  <input
                    className="search-input"
                    autoFocus
                    type="text"
                    placeholder="Search products..."
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                    onBlur={() => {
                      if (!search) setShowSearch(false); // collapse if empty
                    }}
                  />
                )}
                <span className="nav-count">
                  <span>{ITEMS.length} items</span>
                  <span className="dot">·</span>
                  <span>{CATEGORIES.length - 1} categories</span>
                </span>
                {/* MOBILE MENU BUTTON */}
                <button
                  className="menu-btn"
                  onClick={() => setMenuOpen(!menuOpen)}
                >
                  ☰
                </button>
              </div>
            </nav>

            <section className="hero">
              <div className="hero-collage">
                {collageImages.map((img, index) => (
                  <img key={index} src={img} alt="catalog" />
                ))}
              </div>
              <div className="hero-bg-text">CATALOG</div>
              <div className="hero-eyebrow">Dynamic Multi-Category Catalog</div>
              <h1 className="hero-title">
                EXPLORE
                <br />
                EVERY
                <br />
                <em>CATEGORY</em>
              </h1>
              <p className="hero-sub">
                Cars, bikes, phones, computers — browse the full collection,
                filter by category, and inspect detailed specifications for
                every item.
              </p>
            </section>

            <div className="filter-bar">
              {CATEGORIES.map((cat) => (
                <button
                  key={cat}
                  className={`filter-btn${activeFilter === cat ? " active" : ""}`}
                  data-count={
                    cat === "All"
                      ? searchFilteredItems.length
                      : countForCat(cat)
                  }
                  onClick={() => setActiveFilter(cat)}
                >
                  {cat}
                </button>
              ))}
            </div>
            {menuOpen && (
              <div className="mobile-filter-menu">
                {CATEGORIES.map((cat) => (
                  <button
                    key={cat}
                    className={`filter-btn${activeFilter === cat ? " active" : ""}`}
                    data-count={
                      cat === "All"
                        ? searchFilteredItems.length
                        : countForCat(cat)
                    }
                    onClick={() => {
                      setActiveFilter(cat);
                      setMenuOpen(false); // close after select
                    }}
                  >
                    {cat}
                  </button>
                ))}
              </div>
            )}

            <div className="catalog-body">
              {visibleCategories.map((cat) => {
                const catItems = filteredItems.filter(
                  (i) => i.category === cat,
                );
                return (
                  <section
                    key={cat}
                    className="category-section"
                    id={`category-${cat}`}
                  >
                    <div className="category-header">
                      <h2 className="category-title">{cat}</h2>
                      <span className="category-count-label">
                        {catItems.length} item{catItems.length !== 1 ? "s" : ""}
                      </span>
                    </div>
                    <div className="items-grid">
                      {catItems.map((item, i) => (
                        <ItemCard key={i} item={item} onSelect={onSelect} />
                      ))}
                      {filteredItems.length === 0 && (
                        <div className="no-results">No results found</div>
                      )}
                    </div>
                  </section>
                );
              })}
            </div>

            <footer className="footer">
              <div className="footer-brand">
                CAT<span>⬡</span>LOG
              </div>
              <div className="footer-note">
                Dynamic Multi-Category Catalog · React + CSS
              </div>
            </footer>
          </>
        );
      }

      // ─── DETAIL PAGE ───
      function DetailPage({ item, onBack, setSelectedItem }) {
        useEffect(() => {
          window.scrollTo({ top: 0, behavior: "smooth" });
        }, [item]);

        const related = ITEMS.filter(
          (i) => i.category === item.category && i.itemname !== item.itemname,
        ).slice(0, 6);

        return (
          <div className="detail-page">
            <nav className="nav">
              <div className="nav-logo">
                CAT<span>⬡</span>LOG
              </div>
              <div className="nav-right">
                <button className="nav-back-btn" onClick={onBack}>
                  <span className="nav-back-arrow">←</span>
                  Back to Catalog
                </button>
              </div>
            </nav>

            {/* Hero image */}
            <div className="detail-hero">
              <a href={item.image} target="_blank" rel="noopener noreferrer">
                <img
                  className="detail-hero-img"
                  src={item.image}
                  alt={item.itemname}
                  onError={(e) => {
                    e.target.style.opacity = "0";
                  }}
                />
                <div className="detail-hero-overlay" />
                <div className="detail-hero-content">
                  <div className="detail-eyebrow">{item.category}</div>
                  <h1 className="detail-title">{item.itemname}</h1>
                </div>{" "}
              </a>
            </div>

            {/* Main content */}
            <div className="detail-content">
              <div className="detail-main">
                <div className="detail-section-label">Specifications</div>
                <div className="specs-grid">
                  {item.itemprops.map((prop, i) => (
                    <div key={i} className="spec-item">
                      <div className="spec-label">{prop.label}</div>
                      <div className="spec-value">
                        {prop.value}{" "}
                        {prop.label.toLowerCase() === "color" &&
                          prop.colorCode && (
                            <span
                              className="color-box"
                              style={{ backgroundColor: prop.colorCode }}
                            />
                          )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="detail-sidebar">
                <div className="sidebar-category-block">
                  <div className="sidebar-label">Category</div>
                  <div className="sidebar-value">{item.category}</div>
                  <div className="sidebar-gold-line" />
                </div>
                <div className="sidebar-category-block">
                  <div className="sidebar-label">Total Specs</div>
                  <div className="sidebar-value">{item.itemprops.length}</div>
                  <div className="sidebar-gold-line" />
                </div>
                <button className="btn-primary">Configure →</button>
                <button className="btn-ghost" onClick={onBack}>
                  ← Back to Catalog
                </button>
              </div>
            </div>

            {/* Related items */}
            {related.length > 0 && (
              <div className="related-section">
                <div className="related-title">More in {item.category}</div>
                <div className="related-grid">
                  {related.map((r, i) => (
                    <div
                      key={i}
                      className="related-card"
                      onClick={() => {
                        setSelectedItem(r);
                        window.scrollTo({ top: 0, behavior: "smooth" });
                      }}
                    >
                      <div className="related-img-wrap">
                        <img
                          className="related-img"
                          src={r.image}
                          alt={r.itemname}
                          onError={(e) => {
                            e.target.style.opacity = "0";
                          }}
                        />
                      </div>
                      <div className="related-info">
                        <div className="related-name">{r.itemname}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <footer className="footer">
              <div className="footer-brand">
                CAT<span>⬡</span>LOG
              </div>
              <div className="footer-note">
                {item.category} · {item.itemname}
              </div>
            </footer>
          </div>
        );
      }

      // ─── APP ROOT ───
      function App() {
        const [selectedItem, setSelectedItem] = useState(null);
        const [lastCategory, setLastCategory] = useState(null);
        const handleSelect = useCallback((item) => {
          setSelectedItem(item);
          setLastCategory(item.category);
          window.scrollTo({ top: 0, behavior: "smooth" });
        }, []);

        const handleBack = useCallback(() => {
          setSelectedItem(null);
        }, []);

        return selectedItem ? (
          <DetailPage
            item={selectedItem}
            onBack={handleBack}
            setSelectedItem={setSelectedItem}
          />
        ) : (
          <HomePage onSelect={handleSelect} scrollToCategory={lastCategory} />
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
